<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Imagine · Prototype</title>
<style>
/* ─── Fonts ─────────────────────────────────────────────────── */
@font-face {
  font-family: "Greed";
  src: url("./Greed/GreedStandardVF.woff2") format("woff2"),
       url("./Greed/GreedStandardVF.ttf") format("truetype");
  font-weight: 100 900;
  font-style: normal;
}

/* ─── Tokens ─────────────────────────────────────────────────── */
:root {
  --bg: #ffffff;
  --c0: #000409;
  --c1: #67707c;
  --stroke: #e0e1e1;
  --accent: #00875a;
  --icon-bg: #f7f7f8;
  --hint-grad: linear-gradient(92.559deg,rgb(1,49,47) 4%,rgb(86,203,164) 100%);
  --shadow-chat: 0 6px 32px rgba(0,0,0,.12);
  --shadow-sm: 0 2px 16px rgba(0,0,0,.10);
  --shadow-sheet: 0 -8px 32px rgba(0,0,0,.14);
  --ease: cubic-bezier(0.32,0.72,0,1);
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --dur: 420ms;
}

/* ─── Reset ──────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{font-family:inherit;cursor:pointer}
textarea{font-family:inherit}

html,body{
  width:100%;height:100%;
  background:#f7f7f8;
  display:flex;align-items:center;justify-content:center;
  font-family:"Greed",-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}

/* ─── Phone frame ────────────────────────────────────────────── */
.phone{
  position:relative;
  width:393px;height:844px;
  background:white;
  border-radius:0;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.35);
  flex-shrink:0;
}

@media(max-width:440px){
  html,body{background:white;align-items:flex-start}
  .phone{width:100%;height:100dvh;border-radius:0;box-shadow:none}
}
/* Short desktop/tablet screens — don't let phone overflow viewport */
@media(min-width:441px) and (max-height:880px){
  .phone{height:min(844px,100dvh);width:min(393px,100vw)}
}
/* Tablets — center the phone frame comfortably */
@media(min-width:441px) and (max-width:768px){
  .phone{width:min(393px,100vw);height:min(844px,100dvh)}
}

/* ─── Screen ─────────────────────────────────────────────────── */
.screen{
  position:relative;
  width:100%;height:100%;
  background:var(--bg);
  overflow:hidden;
}

/* ─── Scrollable content ─────────────────────────────────────── */
.scroll{
  position:absolute;
  inset:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}

/* ─── Header ─────────────────────────────────────────────────── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 10px 8px;
  height:52px;
  position:absolute;
  top:0;left:0;right:0;
  z-index:10;
  background:var(--bg);
}
.header-spacer{height:52px;flex-shrink:0}
.hdr-back{
  width:40px;height:40px;border:none;background:transparent;
  border-radius:6px;display:flex;align-items:center;justify-content:center;
}
.hdr-credit{display:flex;align-items:center;gap:4px}
.hdr-credit span{
  font-size:16px;font-weight:450;line-height:18px;color:var(--c0);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── D2 banner strip ────────────────────────────────────────── */
.d2-banner{
  display:flex;align-items:center;
  padding:10px 16px;gap:12px;
  border-bottom:1px solid var(--stroke);
  background:white;
  cursor:pointer;
  overflow:hidden;
  max-height:0;opacity:0;
  transition:max-height .4s var(--ease), opacity .3s ease, padding .4s var(--ease);
  pointer-events:none;
}
.d2-banner.visible{
  max-height:60px;opacity:1;
  padding:10px 16px;
  pointer-events:auto;
}
.d2-banner-thumbs{
  display:flex;position:relative;
  width:52px;height:32px;flex-shrink:0;
}
.d2-banner-thumb{
  width:28px;height:32px;border-radius:6px;border:1.5px solid white;
  object-fit:cover;position:absolute;
  background:#e0e0e0;
}
.d2-banner-thumb:nth-child(1){left:0;z-index:2}
.d2-banner-thumb:nth-child(2){left:16px;z-index:1}
.d2-banner-thumb:nth-child(3){left:24px;z-index:0}
.d2-banner-info{flex:1;min-width:0}
.d2-banner-title{
  font-size:13px;font-weight:450;line-height:15px;color:var(--c0);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}
.d2-banner-sub{
  font-size:12px;font-weight:420;line-height:14px;color:var(--c1);
  margin-top:2px;font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}
.d2-banner-arrow{
  width:28px;height:28px;border:none;background:var(--icon-bg);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

/* ─── Title ──────────────────────────────────────────────────── */
.title-wrap{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:0 24px;margin-top:24px;margin-bottom:32px;
}
.imagine-spark{position:relative;display:inline-block}
.sparkle-star{
  position:absolute;
  top:3px;
  left:50%;
  transform:translateX(-50%);
  width:6.421px;height:7.362px;
  pointer-events:none;
}
.title-wrap p{
  font-size:24px;line-height:26px;color:var(--c0);text-align:center;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}
.t-light{font-weight:300;letter-spacing:-0.72px}
.t-medium{font-weight:450;letter-spacing:-0.288px}
.t-accent{color:var(--accent)}

/* tabs removed */

/* ─── Gallery ────────────────────────────────────────────────── */
.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:0 24px 0;
}
.g-card{
  position:relative;border-radius:8px;overflow:hidden;
  aspect-ratio:1;background:#f0f0f0;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.g-card img{
  width:100%;height:100%;object-fit:cover;display:block;
  pointer-events:none;
}
.g-card-tap{
  position:absolute;inset:0;
  background:rgba(0,0,0,0);
  transition:background .15s ease;
}
.g-card:active .g-card-tap{background:rgba(0,0,0,.12)}

/* ─── Bottom gradient fade (sits from bottom of screen, over images) */
.fade-bottom{
  position:absolute;
  left:0;right:0;bottom:0;
  height:220px;
  background:linear-gradient(180deg,rgba(255,255,255,0) 40%,rgba(255,255,255,0.7) 68%,#fff 88%);
  pointer-events:none;
  z-index:15;
}

/* ─── Chat box (ImagineScreen.tsx interaction pattern) ───────── */
.chat{
  position:absolute;
  left:calc(50% - 179px);
  width:358px;
  bottom:24px;
  height:56px;
  overflow:hidden;
  background:rgba(255,255,255,0.96);
  border:1px solid white;
  border-radius:12px;
  box-shadow:0px 4px 24px 0px rgba(0,0,0,0.16);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:25;
  cursor:pointer;
  transition:height 0.48s cubic-bezier(0.32,0.72,0,1),
             transform 0.38s cubic-bezier(0.32,0.72,0,1);
}
.chat.expanded{
  height:200px;
  cursor:default;
}

/* Floating + button: top animates 12→100 */
.chat-add{
  position:absolute;
  left:12px;top:12px;
  width:32px;height:32px;
  background:white;
  border:1px solid #e1e2e5;
  border-radius:50%;
  box-shadow:0px 4px 6px rgba(0,0,0,0.04);
  display:flex;align-items:center;justify-content:center;
  z-index:3;pointer-events:none;cursor:default;
  transition:top 0.48s cubic-bezier(0.32,0.72,0,1);
  flex-shrink:0;
}
.chat.expanded .chat-add{
  top:100px;pointer-events:auto;cursor:pointer;
}

/* Collapsed hint: fades out + slides up */
.chat-hint{
  position:absolute;inset:0;
  display:flex;align-items:center;
  padding-left:52px;padding-right:12px;
  opacity:1;transform:translateY(0);
  transition:opacity 0.2s ease,transform 0.26s ease;
  cursor:pointer;
}
.chat.expanded .chat-hint{
  opacity:0;visibility:hidden;transform:translateY(-12px);pointer-events:none;
}
/* Generating state — collapsed 56px pill showing submitted prompt */
.chat-gen-label{
  position:absolute;inset:0;
  display:block;
  padding:0 56px 0 16px;
  line-height:56px;
  opacity:0;pointer-events:none;
  font-size:16px;font-weight:420;color:var(--c0);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
  transition:opacity 0.2s ease;
}
.chat.generating .chat-gen-label{opacity:1}
.chat.generating .chat-hint{opacity:0!important;pointer-events:none}
.chat.generating .chat-add{opacity:0;pointer-events:none!important}
.chat.generating{pointer-events:none}
.chat-hint-wrap{
  flex:1;overflow:hidden;
  display:flex;align-items:center;
  font-size:16px;font-weight:420;line-height:18px;
  color:var(--c1);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
  white-space:nowrap;
}
.chat-hint-rolling{
  overflow:hidden;height:18px;
  display:inline-flex;flex-direction:column;flex-shrink:0;
}
.chat-hint-rolling .hint-item{
  height:18px;line-height:18px;
  background:var(--hint-grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;white-space:nowrap;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* Textarea area: fades in with 0.14s delay */
.chat-tx-area{
  position:absolute;
  top:12px;left:12px;right:12px;
  height:80px;
  opacity:0;pointer-events:none;
  transition:opacity 0.22s ease 0s;
}
.chat.expanded .chat-tx-area{
  opacity:1;pointer-events:auto;
  transition:opacity 0.22s ease 0.14s;
}
.chat-tx{
  width:100%;height:100%;
  border:none;outline:none;resize:none;
  background:transparent;
  font-size:16px;line-height:20px;color:var(--c0);
  font-family:"Greed",sans-serif;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
  padding:8px 12px 0 0;
}
.chat-tx::placeholder{color:var(--c1)}

/* Dice: fades in with delay */
.chat-dice{
  position:absolute;
  top:100px;left:52px;
  width:32px;height:32px;
  background:white;
  border:1px solid #e1e2e5;
  border-radius:50%;
  box-shadow:0px 4px 6px rgba(0,0,0,0.04);
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  transition:opacity 0.5s ease 0.05s;
  cursor:pointer;z-index:3;
}
.chat.expanded .chat-dice{
  opacity:1;
  transition:opacity 0.5s ease 0.15s;
}

/* Reset button: in controls row, right side */
.btn-reset{
  position:absolute;
  top:100px;right:12px;
  display:none;flex-direction:column;gap:2px;
  background:transparent;border:none;cursor:pointer;padding:0;
  height:32px;align-items:center;justify-content:center;
}
.btn-reset.visible{display:flex}
.btn-reset .br-label{
  font-size:14px;font-weight:450;line-height:16px;
  color:var(--c0);font-family:"Greed",sans-serif;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}
.btn-reset .br-line{height:1px;background:var(--c0)}

/* Full-width Create CTA */
.btn-create{
  position:absolute;
  top:144px;left:12px;right:12px;
  height:44px;
  background:var(--c0);border:none;
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  gap:12px;padding:0 24px;
  cursor:pointer;box-sizing:border-box;
  box-shadow:inset 0 2px 2px rgba(255,255,255,.25);
}
.btn-create .bc-label{
  font-size:16px;font-weight:450;line-height:18px;
  color:white;font-family:"Greed",sans-serif;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}
.btn-create .bc-sep{
  width:1px;height:16px;
  background:rgba(255,255,255,.3);flex-shrink:0;
}
.btn-create .bc-credit-val{
  font-size:16px;font-weight:450;line-height:18px;
  color:white;font-family:"Greed",sans-serif;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* "Use" CTA on gallery cards — exact Figma values */
.g-use-btn{
  position:absolute;bottom:8px;right:8px;
  display:flex;align-items:center;gap:5px;
  padding:4px 6px;
  background:rgba(0,4,9,.3);
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  border-radius:4px;border:none;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.g-use-btn span{
  font-size:14px;font-weight:450;line-height:16px;color:#fff;
  font-family:"Greed",sans-serif;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── D1 Status bar ──────────────────────────────────────────── */
/* Width fixed at max pill size so translateX(-50%) never shifts during morph */
.d1-status{
  position:absolute;
  top:12px;left:50%;
  width:376px;
  transform:translateX(-50%);
  display:flex;justify-content:center;align-items:flex-start;
  z-index:100;
  pointer-events:none;opacity:0;
  /* exit fade — entrance is GSAP-controlled */
}
.d1-status.visible{pointer-events:auto}

.status-pill{
  background:white;
  border:1px solid var(--stroke);
  box-shadow:var(--shadow-sm);
  border-radius:12px;
  overflow:hidden;
  display:flex;align-items:center;
  will-change:width,height; /* hint compositor */
  flex-shrink:0;
}

/* Loading pill — while generating */
.status-pill.s-loading{
  padding:0 12px;gap:8px;
  align-items:center;
}

/* After gen — single image */
.status-pill.s-expanded{
  padding:0;cursor:pointer;
  flex-direction:column;align-items:stretch;
}

/* After gen — multiple images */
.status-pill.s-expanded-multi{
  padding:0;cursor:pointer;
  flex-direction:column;align-items:stretch;
}

/* Post gen — condensed pill */
.status-pill.s-condensed{
  padding:0 12px 0 14px;gap:8px;cursor:pointer;
}

/* Loading state inner */
@keyframes spin{to{transform:rotate(360deg)}}
.sl-thumb{
  width:24px;height:24px;border-radius:4px;
  flex-shrink:0;background:#e5e6e6;object-fit:cover;display:block;
}
.sl-text{
  flex:1;
  font-size:14px;font-weight:450;line-height:18px;
  color:var(--c0);white-space:nowrap;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}
.sl-spin{
  width:14px;height:14px;flex-shrink:0;
  border:1.5px solid rgba(0,4,9,.12);
  border-top-color:var(--c0);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

/* Expanded header — shared single + multi */
.sx-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 12px 0;flex-shrink:0;
}
.sx-header-left{display:flex;align-items:center;gap:8px}
.sx-title{
  font-size:14px;font-weight:450;line-height:18px;color:var(--c0);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;white-space:nowrap;
}
.sx-close{
  width:14px;height:14px;
  background:none;border:none;padding:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
}

/* Single expanded image area */
.sx-image-area{
  display:flex;justify-content:center;
  padding:24px 0 12px;
}
.sx-photo{
  width:80px;height:80px;border-radius:8px;
  object-fit:cover;display:block;flex-shrink:0;background:#e5e6e6;
}

/* Multi expanded strip */
.sm-strip{
  display:flex;gap:8px;
  padding:24px 12px 12px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;flex-shrink:0;
}
.sm-strip::-webkit-scrollbar{display:none}
.sm-strip-th{
  width:80px;height:80px;border-radius:8px;
  object-fit:cover;flex-shrink:0;background:#e5e6e6;
}

/* Condensed inner */
.sc-thumb{
  width:24px;height:24px;border-radius:4px;
  object-fit:cover;flex-shrink:0;background:#e5e6e6;
}
.sc-thumb-stack{
  position:relative;width:29px;height:26px;flex-shrink:0;
}
.sc-thumb-back{
  position:absolute;left:0;top:2px;
  width:22px;height:22px;border-radius:4px;
  background:#cdcdce;object-fit:cover;
}
.sc-thumb-front{
  position:absolute;left:3px;top:0;
  width:26px;height:26px;border-radius:4px;
  object-fit:cover;background:#e5e6e6;
}
.sc-label{
  font-size:14px;font-weight:450;line-height:18px;color:var(--c0);
  flex:1;white-space:nowrap;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── D2 full-width expanded banner ─────────────────────────── */
/* slides out from behind header — z-index 9 keeps it under header during animation */
.d1-status.d2-full{
  left:0;width:100%;
  top:52px;           /* flush with header bottom — no gap for middle state */
  transform:translateY(-100%);
  z-index:9;
  transition:transform 0.48s cubic-bezier(0.34,1.08,0.64,1),opacity 0.25s ease;
}
.d1-status.d2-full.visible{transform:translateY(0)}
.status-pill.s-d2-expanded{
  border-radius:0 0 12px 12px;
  width:100%;height:128px;
  padding:0;flex-direction:column;align-items:stretch;cursor:pointer;
  border:none;
  box-shadow:0 10px 16px 0 rgba(0,0,0,0.06);
}
.d2x-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:16px;flex-shrink:0;
}
.d2x-strip{
  display:flex;gap:8px;padding:0 24px 0;margin-top:16px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;flex-shrink:0;
  touch-action:pan-x;
}
.d2x-strip::-webkit-scrollbar{display:none}
.d2x-th{
  width:80px;height:80px;border-radius:12px;
  object-fit:cover;flex-shrink:0;background:#e5e6e6;
}

/* ─── D2 floating toast ──────────────────────────────────────── */
.d2-toast{
  position:absolute;
  top:62px;left:50%;
  transform:translateX(-50%) translateY(0);
  z-index:100;
  background:white;
  border:1px solid var(--stroke);
  border-radius:20px;
  box-shadow:var(--shadow-sm);
  display:flex;align-items:center;
  gap:8px;padding:8px 14px 8px 8px;
  white-space:nowrap;
  pointer-events:auto;cursor:pointer;
  opacity:0;pointer-events:none;
  transition:opacity .3s ease, transform .35s var(--ease);
}
.d2-toast.visible{opacity:1;pointer-events:auto}
.d2-toast-thumb{
  width:28px;height:28px;border-radius:6px;
  object-fit:cover;flex-shrink:0;
}
.d2-toast-thumb-placeholder{
  width:28px;height:28px;border-radius:6px;flex-shrink:0;
  background:linear-gradient(135deg,#d4f5e6,#a8e6cc);
}
.d2-toast-txt{
  font-size:13px;font-weight:420;line-height:15px;color:var(--c0);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── Backdrop ───────────────────────────────────────────────── */
.backdrop{
  position:absolute;inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;pointer-events:none;
  z-index:50;
  transition:opacity var(--dur) var(--ease);
}
.backdrop.open{opacity:1;pointer-events:auto}

/* ─── Bottom sheet (Figma 8678-41544) ───────────────────────── */
.sheet{
  position:absolute;
  left:0;right:0;bottom:0;
  height:92%;
  background:white;
  border-top-left-radius:16px;
  border-top-right-radius:16px;
  box-shadow:var(--shadow-sheet);
  z-index:51;
  transform:translateY(100%);
  transition:transform 0.5s cubic-bezier(0.34,1.12,0.64,1);
  display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
  touch-action:none;
  overflow:hidden;
}
.sheet.open{transform:translateY(0)}
.sheet-handle-row{
  display:flex;justify-content:center;
  padding:12px 0 0;cursor:grab;flex-shrink:0;
}
.sheet-handle{
  width:48px;height:4px;border-radius:999px;
  background:#e0e1e1;
}
/* Sheet header: title + close */
.sheet-top{
  position:relative;flex-shrink:0;
  padding:0 24px 0;
}
.sheet-close{
  position:absolute;right:24px;top:20px;
  width:24px;height:24px;
  background:none;border:none;padding:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.sheet-titles{
  padding:24px 0 0;
}
.sheet-title-main{
  font-size:24px;font-weight:450;line-height:1.08;
  color:#000409;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}
.sheet-title-sub{
  font-size:16px;font-weight:420;line-height:1.4;
  color:#67707c;margin-top:6px;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── Direction switcher ─────────────────────────────────────── */
.dir-sw{

  background:rgba(10,10,10,.82);

  -webkit-backdrop-filter:blur(14px);
  border-radius:100px;
  display:flex;gap:2px;padding:4px;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}

  .dir-sw{bottom:calc(env(safe-area-inset-bottom)+10px)}

.dir-btn{

  color:rgba(255,255,255,.55);

  font-size:14px;font-weight:450;letter-spacing:.1px;

}
.dir-btn.active{

}

/* ─── Hint label overlay ─────────────────────────────────────── */
.dir-label{
  position:absolute;
  top:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,4,9,.06);
  border-radius:100px;
  padding:4px 12px;
  font-size:11px;font-weight:450;color:var(--c0);
  letter-spacing:.3px;
  pointer-events:none;
  z-index:5;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── Animations ─────────────────────────────────────────────── */
@keyframes slideDown{
  from{transform:translateX(-50%) translateY(-110%)}
  to{transform:translateX(-50%) translateY(0)}
}
@keyframes pulse-dot{
  0%,100%{opacity:1}50%{opacity:.4}
}
.pulse{animation:pulse-dot 1.2s ease infinite}

/* Hint roll keyframe */
@keyframes hintRoll{
  from{transform:translateY(0)}

/* ─── Overlay dim for prompt ─────────────────────────────────── */
.overlay{

.overlay.show{opacity:1;pointer-events:auto}

// ─── Hint cycle ────────────────────────────────────────────────────────
function startHintCycle() {
  hintTimer = setInterval(() => {
    if (S.promptOpen) return;
    const el = $('hintText');

    // Exit: slide up + fade out
    el.style.transition = 'transform 0.28s cubic-bezier(0.4,0,1,1), opacity 0.22s ease';
    el.style.transform = 'translateY(-10px)';
    el.style.opacity = '0';

    setTimeout(() => {
      hintIdx = (hintIdx + 1) % HINTS.length;
      el.textContent = HINTS[hintIdx];
      // Reset below, no transition
      el.style.transition = 'none';
      el.style.transform = 'translateY(14px)';
      el.style.opacity = '0';

      // Enter: slide up into place + fade in
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.style.transition = 'transform 0.42s cubic-bezier(0.22,1,0.36,1), opacity 0.3s ease';
        el.style.transform = 'translateY(0)';
        el.style.opacity = '1';
      }));
    }, 300);
  }, 3200);
}

let diceSpinning = false;
function rollDice() {
  if (diceSpinning) return;
  diceSpinning = true;
  const svg = $('diceSvg');
  svg.style.transition = 'transform .3s ease';
  svg.style.transform = 'rotate(180deg)';

  chatTx.style.opacity = '0';
  setTimeout(() => {

// ─── Create ────────────────────────────────────────────────────────────
function handleCreate(e) {
  if (e) e.stopPropagation();
  if (!S.promptText.trim()) return;
  const prompt = S.promptText.trim();
  S.promptText = '';
  chatTx.value = '';
  onTxInput();

  // Collapse chat — no overlay, no hint cycle (we'll show prompt text instead)
  S.promptOpen = false;
  chat.classList.remove('expanded');
  chat.style.transform = '';
  chatTx.blur();
  overlay.classList.remove('show');
  clearInterval(hintTimer);

  // Enter generating state: show prompt text in collapsed pill
  $('chatGenLabel').textContent = prompt;
  chat.classList.add('generating');

  // Simulate generation
  S.genPhase = 'generating';
  S.genQueue++;

  if (S.dir === 'D1') {
    startD1Loading();
  } else if (S.dir === 'D2') {
    startD2Loading();
  } else {
    startD3Loading();
  }

  // Simulate completion after 2.2s
  setTimeout(() => {
    const imgSrc = PHOTOS[S.genImages.length % PHOTOS.length];
    S.genImages.push({ src: imgSrc, prompt });
    S.genQueue--;
    S.genPhase = S.genQueue > 0 ? 'generating' : 'done';

    // Exit generating state, restore hint
    chat.classList.remove('generating');
    startHintCycle();

    if (S.dir === 'D1') {
      finishD1Gen();
    } else if (S.dir === 'D2') {
      finishD2Gen();
    } else {
      finishD3Gen();
    }

    // Rebuild sheet grid
    buildSheetGrid();
  }, 2200);
}

// Dynamic Island-style morph: GPU translateY for position, power4.out for smoothness
function morphD1(key, buildFn) {
  const dims = PILL_DIMS[key];

  // Content swap fires first — pill has barely moved so the snap is invisible
  buildFn();

  // GPU-composited position via translateY (no layout reflow)
  gsap.to(d1Status, {
    y: dims.y,
    duration: 0.5,
    ease: 'power4.out',
    overwrite: true,
  });
  // Width/height morph — smooth deceleration, no overshoot jitter
  gsap.to(statusPill, {
    width: dims.w, height: dims.h,
    duration: 0.5,
    ease: 'power4.out',
    overwrite: true,
  });
}

function startD1Loading() {
  S.d1State = 'loading';
  const buildFn = () => {
    statusPill.className = 'status-pill s-loading';
    statusPill.innerHTML = `
      <div class="sl-thumb"></div>
      <span class="sl-text">Imagining your photo...</span>
      <div class="sl-spin"></div>
    `;
  };

  if (!d1Status.classList.contains('visible')) {
    // First appearance — slide in from top with GSAP
    gsap.set(d1Status, { y: -28, opacity: 0 });
    gsap.set(statusPill, { width: 239, height: 48 });
    buildFn();
    d1Status.classList.add('visible'); // pointer-events: auto
    gsap.to(d1Status, { y: 0, opacity: 1, duration: 0.45, ease: 'power4.out' });
  } else {
    // Returning from condensed/expanded — morph to loading
    morphD1('loading', buildFn);
  }
}

    // D1: auto-condense when user scrolls while status is expanded
    if (S.dir === 'D1' && S.d1State === 'expanded') {
      showD1Condensed();

    // D2: auto-condense expanded banner when user scrolls down >16px
    if (S.dir === 'D2' && S.d1State === 'expanded' && st > 16) {
      showD2Condensed();
    }

    // D3: collapse in-scroll card → condensed status pill when scrolled > 80px
    if (S.dir === 'D3' && S.d3BannerVisible) {
      const shouldBeCompact = st > 80;
      if (shouldBeCompact && !S.d3Compact) {
        S.d3Compact = true;
        d3Card.classList.remove('visible');
        // Build condensed pill (same as D1/D2)
        const img = S.genImages[S.genImages.length - 1];
        const multi = S.genImages.length > 1;
        const thumbHtml = multi ? `
          <div class="sc-thumb-stack">
            <img class="sc-thumb-back" src="${S.genImages[0].src}" onerror="this.style.background='#cdcdce';this.removeAttribute('src')"/>
            <img class="sc-thumb-front" src="${img.src}" onerror="this.style.background='#e5e6e6';this.removeAttribute('src')"/>

        statusPill.className = 'status-pill s-condensed';
        statusPill.innerHTML = `

        S.d1State = 'condensed';
        gsap.set(statusPill, { width: 264, height: 50, clearProps: 'opacity' });

      } else if (!shouldBeCompact && S.d3Compact) {

        d3Card.classList.add('visible');
      }
    }
  }, { passive: true });
}

// ─── Sheet drag to dismiss ─────────────────────────────────────────────
function setupSheetDrag() {
  const handleRow = $('sheetHandleRow');
  let startY, startT, lastY, vel;
  const sheetEl = sheet;

  function onStart(e) {
    if (!S.sheetOpen) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    startY = y; startT = Date.now(); lastY = y; vel = 0;
    sheetEl.style.transition = 'none';
  }
  function onMove(e) {
    if (startY == null) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const dy = Math.max(0, y - startY);
    vel = (y - lastY) / Math.max(1, Date.now() - startT) * 16;
    lastY = y; startT = Date.now();
    sheetEl.style.transform = `translateY(${dy}px)`;
    e.preventDefault();
  }
  function onEnd() {
    if (startY == null) return;
    startY = null;
    sheetEl.style.transition = `transform var(--dur) var(--ease)`;
    const currentY = parseFloat(sheetEl.style.transform.replace('translateY(','')) || 0;
    const sheetH = sheetEl.offsetHeight;
    if (vel > 0.5 || currentY > sheetH * 0.38) {
      closeSheet();
    } else {
      sheetEl.style.transform = 'translateY(0)';
    }
  }

  handleRow.addEventListener('touchstart', onStart, {passive:true});
  handleRow.addEventListener('touchmove', onMove, {passive:false});
  handleRow.addEventListener('touchend', onEnd);
  handleRow.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onEnd);
}

// ─── Direction switching ───────────────────────────────────────────────
function setDir(dir) {
  if (S.dir === dir) return;
  S.dir = dir;

  // Reset state
  clearTimeout(S.d1CollapseTimer);
  clearTimeout(S.d2ToastTimer);
  S.d1State = 'hidden';
  S.d2BannerCount = 0;
  S.d2ToastVisible = false;
  S.d3BannerVisible = false;
  S.d3Compact = false;
  S.genPhase = 'idle';
  S.genImages = [];
  S.genQueue = 0;
  S.sheetOpen = false;

  // Reset UI — kill any in-flight GSAP morphs first
  gsap.killTweensOf([d1Status, statusPill]);
  gsap.set(d1Status, { clearProps: 'transform,opacity' });
  gsap.set(statusPill, { clearProps: 'width,height,opacity' });
  d1Status.classList.remove('visible', 'd2-full');
  statusPill.innerHTML = '';
  d2Banner.classList.remove('visible');
  d2ToastEl.classList.remove('visible');
  d3Card.classList.remove('visible');
  backdrop.classList.remove('open');
  sheet.classList.remove('open');
  collapsePrompt();
  buildSheetGrid();
  scroll.scrollTop = 0;

  // Update switcher
  $('dswD1').classList.toggle('active', dir==='D1');
  $('dswD2').classList.toggle('active', dir==='D2');
  $('dswD3').classList.toggle('active', dir==='D3');
  const labels = { D1: 'Direction 01', D2: 'Direction 02', D3: 'Direction 03' };
  dirLabel.textContent = labels[dir];
}

// ─── Overlay: only when keyboard active AND not generating ──────────────
chatTx.addEventListener('focus', () => {
  if (S.promptOpen && S.genPhase !== 'generating') overlay.classList.add('show');
});
chatTx.addEventListener('blur', () => {
  overlay.classList.remove('show');
});

// ─── Keyboard handling (push chat above keyboard via transform) ────────
const vv = window.visualViewport;
if (vv) {
  const updateKb = () => {
    if (!S.promptOpen) return;
    const kh = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
    chat.style.transform = kh > 50 ? `translateY(-${kh}px)` : '';
  };
  vv.addEventListener('resize', updateKb);
  vv.addEventListener('scroll', updateKb);
}

// ─── Misc UX ───────────────────────────────────────────────────────────
// Dismiss prompt on backdrop tap (already handled by overlay)

// Prevent rubber-band scrolling on body on desktop
document.body.addEventListener('touchmove', e => {
  if (!e.target.closest('.scroll') && !e.target.closest('.sheet-body')) {
    e.preventDefault();
  }
}, { passive: false });

</script>
