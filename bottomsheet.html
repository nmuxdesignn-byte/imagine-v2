<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Imagine · Bottom Sheet</title>
<style>
@font-face {
  font-family: "Greed";
  src: url("./Greed/GreedStandardVF.woff2") format("woff2"),
       url("./Greed/GreedStandardVF.ttf") format("truetype");
  font-weight: 100 900;
  font-style: normal;
}

:root {
  --bg: #ffffff;
  --c0: #000409;
  --c1: #67707c;
  --stroke: #e0e1e1;
  --accent: #00875a;
  --icon-bg: #f7f7f8;
  --shadow-sm: 0 2px 16px rgba(0,0,0,.10);
  --shadow-sheet: 0 -8px 32px rgba(0,0,0,.14);
  --ease: cubic-bezier(0.32,0.72,0,1);
  --spring: cubic-bezier(0.34,1.56,0.64,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{font-family:inherit;cursor:pointer}

html,body{
  width:100%;height:100%;
  background:#f7f7f8;
  display:flex;align-items:center;justify-content:center;
  font-family:"Greed",-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}

.phone{
  position:relative;
  width:393px;height:844px;
  background:white;
  border-radius:0;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.35);
  flex-shrink:0;
}

@media(max-width:440px){
  html,body{background:white;align-items:flex-start}
  .phone{width:100%;height:100dvh;border-radius:0;box-shadow:none}
}
@media(min-width:441px) and (max-height:880px){
  .phone{height:min(844px,100dvh);width:min(393px,100vw)}
}
@media(min-width:441px) and (max-width:768px){
  .phone{width:min(393px,100vw);height:min(844px,100dvh)}
}

.screen{
  position:relative;
  width:100%;height:100%;
  background:var(--bg);
  overflow:hidden;
}

/* ─── Header ──────────────────────────────────────────────────── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 10px 8px;
  height:52px;
  position:absolute;
  top:0;left:0;right:0;
  z-index:10;
  background:var(--bg);
}
.hdr-back{
  width:40px;height:40px;border:none;background:transparent;
  border-radius:6px;display:flex;align-items:center;justify-content:center;
}
.hdr-credit{display:flex;align-items:center;gap:4px}
.hdr-credit span{
  font-size:16px;font-weight:450;line-height:18px;color:var(--c0);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── BG content (blurred, feels like real app behind sheet) ──── */
.bg-content{
  position:absolute;
  inset:0;
  padding-top:52px;
  display:flex;flex-direction:column;align-items:center;
  gap:16px;
  padding-left:24px;padding-right:24px;
  padding-top:80px;
}
.bg-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  width:100%;
}
.bg-card{
  aspect-ratio:1;border-radius:8px;
  background:#f0f0f0;overflow:hidden;
}
.bg-card img{
  width:100%;height:100%;object-fit:cover;display:block;
}

/* ─── Backdrop ────────────────────────────────────────────────── */
.backdrop{
  position:absolute;inset:0;
  background:rgba(0,0,0,.4);
  opacity:0;pointer-events:none;
  z-index:50;
  transition:opacity 0.42s var(--ease);
}
.backdrop.open{opacity:1;pointer-events:auto}

/* ─── Bottom sheet ────────────────────────────────────────────── */
.sheet{
  position:absolute;
  left:0;right:0;bottom:0;
  background:white;
  border-top-left-radius:16px;
  border-top-right-radius:16px;
  box-shadow:var(--shadow-sheet);
  z-index:51;
  transform:translateY(100%);
  transition:transform 0.5s cubic-bezier(0.34,1.12,0.64,1);
  display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
  touch-action:none;
  overflow:hidden;
  /* height is set per variant via JS */
}
.sheet.open{transform:translateY(0)}

.sheet-handle-row{
  display:flex;justify-content:center;
  padding:12px 0 0;
  cursor:grab;flex-shrink:0;
}
.sheet-handle{
  width:48px;height:4px;border-radius:999px;
  background:#e0e1e1;
}

/* ─── Tabs inside sheet ───────────────────────────────────────── */
.sheet-tabs{
  display:flex;
  padding:16px 24px 0;
  gap:0;
  border-bottom:1px solid var(--stroke);
  flex-shrink:0;
}
.sheet-tab{
  font-size:14px;font-weight:450;color:var(--c1);
  background:none;border:none;
  padding:0 0 12px;
  margin-right:24px;
  position:relative;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
  transition:color .2s ease;
  white-space:nowrap;
}
.sheet-tab::after{
  content:'';
  position:absolute;left:0;right:0;bottom:-1px;
  height:2px;border-radius:999px;
  background:var(--c0);
  opacity:0;
  transition:opacity .2s ease;
}
.sheet-tab.active{color:var(--c0)}
.sheet-tab.active::after{opacity:1}

/* ─── Sheet header (title variant, no tabs) ───────────────────── */
.sheet-top{
  position:relative;flex-shrink:0;
  padding:0 24px;
}
.sheet-close{
  position:absolute;right:24px;top:20px;
  width:24px;height:24px;
  background:none;border:none;padding:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.sheet-titles{padding:24px 0 0}
.sheet-title-main{
  font-size:24px;font-weight:450;line-height:1.08;
  color:var(--c0);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}
.sheet-title-sub{
  font-size:16px;font-weight:420;line-height:1.4;
  color:var(--c1);margin-top:6px;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── Sheet body scroll area ──────────────────────────────────── */
.sheet-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:20px 24px 32px;
}
.sheet-body::-webkit-scrollbar{display:none}

/* ─── Image grid ─────────────────────────────────────────────── */
.sheet-grid{
  display:flex;flex-direction:column;gap:16px;
}

.sheet-card{
  border-radius:8px;overflow:hidden;
  background:#f7f7f8;flex-shrink:0;
}
.sheet-card-img{
  width:100%;
  aspect-ratio:342/382;
  overflow:hidden;background:#e5e6e6;
  border:1px solid rgba(241,241,241,1);
  border-bottom:none;
  border-radius:8px 8px 0 0;
}
.sheet-card-img img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.sheet-card-bar{
  display:flex;align-items:center;
  height:42px;
  padding:0 12px 0 8px;
  background:#f7f7f8;
  border:1px solid rgba(224,225,225,1);
  border-top:1px solid rgba(224,225,225,1);
  border-radius:0 0 8px 8px;
  gap:8px;
}
.sheet-card-prompt{
  flex:1;min-width:0;
  font-size:14px;font-weight:420;line-height:16px;color:var(--c1);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sheet-card-use{
  font-family:"Greed",sans-serif;
  font-size:14px;font-weight:450;color:var(--c0);
  background:none;border:none;padding:0;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  white-space:nowrap;flex-shrink:0;
  text-decoration:underline;
  text-decoration-thickness:1px;
  text-underline-offset:2px;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── Compact horizontal scroll variant ──────────────────────── */
.sheet-scroll-row{
  display:flex;gap:10px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding:4px 0 8px;
}
.sheet-scroll-row::-webkit-scrollbar{display:none}
.sheet-scroll-card{
  flex-shrink:0;
  width:140px;
  border-radius:8px;overflow:hidden;
  background:#f7f7f8;
}
.sheet-scroll-card-img{
  width:100%;aspect-ratio:1;
  background:#e5e6e6;overflow:hidden;
}
.sheet-scroll-card-img img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.sheet-scroll-card-label{
  font-size:12px;font-weight:420;color:var(--c1);
  padding:6px 8px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── Empty state ─────────────────────────────────────────────── */
.sheet-empty{
  display:flex;flex-direction:column;align-items:center;
  padding:48px 24px;gap:12px;text-align:center;
}
.sheet-empty-icon{
  width:56px;height:56px;border-radius:16px;
  background:var(--icon-bg);
  display:flex;align-items:center;justify-content:center;
}
.sheet-empty-title{
  font-size:16px;font-weight:450;color:var(--c0);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}
.sheet-empty-sub{
  font-size:14px;font-weight:420;color:var(--c1);line-height:1.5;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── Variant switcher ────────────────────────────────────────── */
.var-sw{
  position:fixed;
  bottom:24px;left:50%;
  transform:translateX(-50%);
  z-index:9999;
  background:rgba(10,10,10,.82);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-radius:100px;
  display:flex;gap:2px;padding:4px;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
@media(max-width:440px){
  .var-sw{bottom:calc(env(safe-area-inset-bottom)+10px)}
}
.var-btn{
  padding:7px 16px;
  border:none;border-radius:100px;
  background:transparent;
  color:rgba(255,255,255,.55);
  font-family:"Greed",sans-serif;
  font-size:13px;font-weight:450;letter-spacing:.1px;
  transition:background .2s ease,color .2s ease;
  white-space:nowrap;
}
.var-btn.active{
  background:white;color:var(--c0);
}

/* ─── Trigger button in BG ────────────────────────────────────── */
.trigger-btn{
  position:absolute;
  bottom:96px;left:50%;
  transform:translateX(-50%);
  z-index:20;
  display:flex;align-items:center;gap:8px;
  padding:14px 24px;
  background:var(--c0);
  border:none;border-radius:12px;
  color:white;
  font-family:"Greed",sans-serif;
  font-size:16px;font-weight:450;letter-spacing:-.1px;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
  box-shadow:0 4px 24px rgba(0,0,0,.2);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:transform .15s ease,box-shadow .15s ease;
}
.trigger-btn:active{transform:translateX(-50%) scale(0.97);box-shadow:0 2px 12px rgba(0,0,0,.2)}

/* ─── Section label ───────────────────────────────────────────── */
.sheet-section-label{
  font-size:12px;font-weight:450;color:var(--c1);letter-spacing:.4px;
  text-transform:uppercase;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
  margin-bottom:12px;
}

/* ─── Drag to dismiss ─────────────────────────────────────────── */
.sheet-drag-hint{
  text-align:center;
  font-size:12px;font-weight:420;color:var(--c1);
  padding-top:8px;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}
</style>
</head>
<body>

<div class="phone" id="phone">
  <div class="screen" id="screen">

    <!-- Header -->
    <div class="header">
      <button class="hdr-back" onclick="closeSheet()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M3.667 12H20.333M9.333 17.667L3.667 12l5.666-5.667" stroke="#000409" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="hdr-credit">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="7.99961" cy="7.99961" r="6.4" stroke="#000409" stroke-width="1.4"/>
          <path d="M7.68636 5.64763L5.64825 7.68573C5.47469 7.8593 5.47469 8.1407 5.64825 8.31427L7.68636 10.3524C7.85992 10.5259 8.14133 10.5259 8.3149 10.3524L10.353 8.31427C10.5266 8.1407 10.5266 7.8593 10.353 7.68573L8.3149 5.64763C8.14133 5.47406 7.85992 5.47406 7.68636 5.64763Z" stroke="#000409" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>23</span>
      </div>
    </div>

    <!-- BG gallery grid -->
    <div class="bg-content">
      <div class="bg-grid" id="bgGrid"></div>
    </div>

    <!-- Open sheet trigger -->
    <button class="trigger-btn" id="triggerBtn" onclick="openSheet()">
      View recent generations
    </button>

    <!-- Backdrop -->
    <div class="backdrop" id="backdrop" onclick="closeSheet()"></div>

    <!-- Bottom sheet -->
    <div class="sheet" id="sheet">
      <div class="sheet-handle-row" id="handleRow">
        <div class="sheet-handle"></div>
      </div>

      <!-- Content injected per variant -->
      <div id="sheetInner"></div>
    </div>

  </div>
</div>

<!-- Variant switcher -->
<div class="var-sw">
  <button class="var-btn active" id="vA" onclick="setVariant('A')">Gallery</button>
  <button class="var-btn" id="vB" onclick="setVariant('B')">Tabs</button>
  <button class="var-btn" id="vC" onclick="setVariant('C')">Compact</button>
  <button class="var-btn" id="vD" onclick="setVariant('D')">Empty</button>
</div>

<script>
const PHOTOS = [
  './photos/photo-1.jpg',
  './photos/photo-3.jpg',
  './photos/photo-4.jpg',
  './photos/photo-6.jpg',
];

const PROMPTS = [
  'standing in front of the Eiffel Tower wearing a black leather jacket',
  'as a CEO in a sleek glass office at golden hour',
  'hiking in the Dolomites at sunrise in a red parka',
  'on a yacht in the Mediterranean wearing white linen',
];

let currentVariant = 'A';
let sheetOpen = false;

// ─── BG grid ────────────────────────────────────────────────────
function buildBgGrid() {
  const grid = document.getElementById('bgGrid');
  grid.innerHTML = PHOTOS.map(src =>
    `<div class="bg-card"><img src="${src}" loading="lazy"/></div>`
  ).join('');
}

// ─── Variant builders ────────────────────────────────────────────

function buildA() {
  // Full-scroll gallery with cards
  const sheet = document.getElementById('sheet');
  sheet.style.height = '92%';
  return `
    <div class="sheet-top">
      <button class="sheet-close" onclick="closeSheet()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M1 1l11 11M12 1L1 12" stroke="#000409" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="sheet-titles">
        <div class="sheet-title-main">Recent Generations</div>
        <div class="sheet-title-sub">You can find these in your gallery later.</div>
      </div>
    </div>
    <div class="sheet-body">
      <div class="sheet-grid">
        ${PHOTOS.map((src, i) => `
        <div class="sheet-card">
          <div class="sheet-card-img"><img src="${src}" loading="lazy"/></div>
          <div class="sheet-card-bar">
            <span class="sheet-card-prompt">${PROMPTS[i % PROMPTS.length]}</span>
            <button class="sheet-card-use">Use</button>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildB() {
  // Tabs: Recent / Favorites
  const sheet = document.getElementById('sheet');
  sheet.style.height = '92%';
  return `
    <div class="sheet-tabs">
      <button class="sheet-tab active" onclick="switchTab(this, 'recent')">Recent</button>
      <button class="sheet-tab" onclick="switchTab(this, 'favorites')">Favorites</button>
      <button class="sheet-tab" onclick="switchTab(this, 'used')">Used</button>
    </div>
    <div class="sheet-body" id="tabBody">
      <div class="sheet-grid">
        ${PHOTOS.map((src, i) => `
        <div class="sheet-card">
          <div class="sheet-card-img"><img src="${src}" loading="lazy"/></div>
          <div class="sheet-card-bar">
            <span class="sheet-card-prompt">${PROMPTS[i % PROMPTS.length]}</span>
            <button class="sheet-card-use">Use</button>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildC() {
  // Compact: short sheet, horizontal scroll row
  const sheet = document.getElementById('sheet');
  sheet.style.height = '52%';
  return `
    <div class="sheet-top">
      <button class="sheet-close" onclick="closeSheet()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M1 1l11 11M12 1L1 12" stroke="#000409" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="sheet-titles">
        <div class="sheet-title-main">4 images ready</div>
        <div class="sheet-title-sub">Tap an image to use it.</div>
      </div>
    </div>
    <div class="sheet-body">
      <div class="sheet-section-label">Generated now</div>
      <div class="sheet-scroll-row">
        ${PHOTOS.map((src, i) => `
        <div class="sheet-scroll-card">
          <div class="sheet-scroll-card-img"><img src="${src}" loading="lazy"/></div>
          <div class="sheet-scroll-card-label">${PROMPTS[i % PROMPTS.length]}</div>
        </div>`).join('')}
      </div>
    </div>`;
}

function buildD() {
  // Empty state
  const sheet = document.getElementById('sheet');
  sheet.style.height = '60%';
  return `
    <div class="sheet-top">
      <button class="sheet-close" onclick="closeSheet()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M1 1l11 11M12 1L1 12" stroke="#000409" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="sheet-titles">
        <div class="sheet-title-main">Recent Generations</div>
        <div class="sheet-title-sub">You can find these in your gallery later.</div>
      </div>
    </div>
    <div class="sheet-body">
      <div class="sheet-empty">
        <div class="sheet-empty-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="18" height="18" rx="4" stroke="#67707c" stroke-width="1.5"/>
            <circle cx="8.5" cy="8.5" r="1.5" fill="#67707c"/>
            <path d="M3 15l5-5 4 4 3-3 6 6" stroke="#67707c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="sheet-empty-title">No generations yet</div>
        <div class="sheet-empty-sub">Use the Imagine prompt below to create your first image.</div>
      </div>
    </div>`;
}

// ─── Tab switching (variant B) ────────────────────────────────────
function switchTab(btn, tab) {
  document.querySelectorAll('.sheet-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const body = document.getElementById('tabBody');
  if (!body) return;
  if (tab === 'recent') {
    body.innerHTML = `<div class="sheet-grid">${PHOTOS.map((src, i) => `
      <div class="sheet-card">
        <div class="sheet-card-img"><img src="${src}" loading="lazy"/></div>
        <div class="sheet-card-bar">
          <span class="sheet-card-prompt">${PROMPTS[i % PROMPTS.length]}</span>
          <button class="sheet-card-use">Use</button>
        </div>
      </div>`).join('')}</div>`;
  } else {
    body.innerHTML = `<div class="sheet-empty" style="padding-top:56px">
      <div class="sheet-empty-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 21C12 21 3 14.895 3 8.5A4.5 4.5 0 0112 6.257 4.5 4.5 0 0121 8.5C21 14.895 12 21 12 21z" stroke="#67707c" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="sheet-empty-title">Nothing here yet</div>
      <div class="sheet-empty-sub">Images you save will appear here.</div>
    </div>`;
  }
}

// ─── Sheet open / close ──────────────────────────────────────────
function openSheet() {
  const sheet = document.getElementById('sheet');
  const backdrop = document.getElementById('backdrop');
  const trigger = document.getElementById('triggerBtn');

  const builders = { A: buildA, B: buildB, C: buildC, D: buildD };
  document.getElementById('sheetInner').innerHTML = (builders[currentVariant] || buildA)();

  sheet.classList.add('open');
  backdrop.classList.add('open');
  trigger.style.opacity = '0';
  trigger.style.pointerEvents = 'none';
  sheetOpen = true;
}

function closeSheet() {
  const sheet = document.getElementById('sheet');
  const backdrop = document.getElementById('backdrop');
  const trigger = document.getElementById('triggerBtn');

  sheet.classList.remove('open');
  backdrop.classList.remove('open');
  trigger.style.opacity = '1';
  trigger.style.pointerEvents = 'auto';
  sheetOpen = false;
}

// ─── Variant switcher ─────────────────────────────────────────────
function setVariant(v) {
  currentVariant = v;
  ['A','B','C','D'].forEach(k => {
    document.getElementById('v'+k).classList.toggle('active', k === v);
  });
  if (sheetOpen) {
    const sheet = document.getElementById('sheet');
    // Quick dismiss + reopen with new variant
    sheet.classList.remove('open');
    setTimeout(() => openSheet(), 300);
  }
}

// ─── Drag to dismiss ─────────────────────────────────────────────
(function() {
  let startY = 0, isDragging = false, startTranslate = 0;
  const handleRow = document.getElementById('handleRow');

  function onStart(e) {
    if (!sheetOpen) return;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    isDragging = true;
    startTranslate = 0;
    const sheet = document.getElementById('sheet');
    sheet.style.transition = 'none';
  }
  function onMove(e) {
    if (!isDragging) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const delta = Math.max(0, y - startY);
    const sheet = document.getElementById('sheet');
    sheet.style.transform = `translateY(${delta}px)`;
    document.getElementById('backdrop').style.opacity = Math.max(0, 0.4 - delta / 600);
  }
  function onEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    const sheet = document.getElementById('sheet');
    const currentY = parseFloat(sheet.style.transform.replace('translateY(','')) || 0;
    sheet.style.transition = '';
    if (currentY > 120) {
      closeSheet();
    } else {
      sheet.style.transform = 'translateY(0)';
      document.getElementById('backdrop').style.opacity = '';
    }
  }

  handleRow.addEventListener('touchstart', onStart, { passive: true });
  handleRow.addEventListener('touchmove', onMove, { passive: true });
  handleRow.addEventListener('touchend', onEnd);
  handleRow.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onEnd);
})();

// ─── Init ────────────────────────────────────────────────────────
buildBgGrid();
</script>
</body>
</html>
