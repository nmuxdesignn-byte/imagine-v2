<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Imagine · Bottom Sheet</title>
<style>
@font-face {
  font-family: "Greed";
  src: url("./Greed/GreedStandardVF.woff2") format("woff2"),
       url("./Greed/GreedStandardVF.ttf") format("truetype");
  font-weight: 100 900;
  font-style: normal;
}

:root {
  --bg:           #ffffff;
  --c0:           #000409;
  --c1:           #67707c;
  --stroke:       #e0e1e1;
  --accent:       #00875a;
  --shadow-sheet: 0 -8px 32px rgba(0,0,0,.14);
  --ease:         cubic-bezier(0.32,0.72,0,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0}

html,body{
  width:100%;height:100%;
  background:#f7f7f8;
  display:flex;align-items:center;justify-content:center;
  font-family:"Greed",-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}

/* ─── Phone ──────────────────────────────────────────────────────── */
.phone{
  position:relative;
  width:393px;height:844px;
  background:white;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.35);
  flex-shrink:0;
}
@media(max-width:440px){
  html,body{background:white;align-items:flex-start}
  .phone{width:100%;height:100dvh;box-shadow:none}
}
@media(min-width:441px) and (max-height:880px){
  .phone{height:min(844px,100dvh);width:min(393px,100vw)}
}

.screen{
  position:relative;
  width:100%;height:100%;
  background:var(--bg);
  overflow:hidden;
}

/* ─── App header ─────────────────────────────────────────────────── */
.app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 10px 8px;
  height:52px;
  position:absolute;top:0;left:0;right:0;
  z-index:10;
  background:var(--bg);
}
.hdr-back{
  width:40px;height:40px;
  border-radius:6px;display:flex;align-items:center;justify-content:center;
}
.hdr-credit{display:flex;align-items:center;gap:4px}
.hdr-credit span{
  font-size:16px;font-weight:450;line-height:18px;color:var(--c0);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── Base screen ────────────────────────────────────────────────── */
.bg-screen{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.trigger-btn{
  padding:14px 28px;
  background:var(--c0);
  border-radius:12px;
  color:white;
  font-family:"Greed",sans-serif;
  font-size:16px;font-weight:450;letter-spacing:-.1px;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
  box-shadow:0 4px 24px rgba(0,0,0,.22);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:transform .15s ease, opacity .3s ease;
  white-space:nowrap;
}
.trigger-btn:active{transform:scale(0.97)}
.trigger-btn.hidden{opacity:0;pointer-events:none}

/* ─── Backdrop ───────────────────────────────────────────────────── */
.backdrop{
  position:absolute;inset:0;
  background:rgba(0,4,9,0.60);
  opacity:0;pointer-events:none;
  z-index:50;
  transition:opacity 0.44s var(--ease);
}
.backdrop.open{opacity:1;pointer-events:auto}

/* ─── Sheet ──────────────────────────────────────────────────────── */
.sheet{
  position:absolute;
  left:0;right:0;bottom:0;
  height:92%;
  background:white;
  border-top-left-radius:16px;
  border-top-right-radius:16px;
  box-shadow:var(--shadow-sheet);
  z-index:51;
  transform:translateY(100%);
  transition:transform 0.52s cubic-bezier(0.34,1.12,0.64,1);
  display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
  overflow:hidden;
  touch-action:none;
}
.sheet.open{transform:translateY(0)}

/* ─── Handle zone ────────────────────────────────────────────────── */
.sheet-handle-zone{
  flex-shrink:0;
  height:28px;
  display:flex;justify-content:center;align-items:flex-start;
  padding-top:12px;
  cursor:grab;
  position:relative;
  z-index:12;
  background:white;
}
.sheet-handle{
  width:48px;height:4px;border-radius:999px;background:var(--stroke);
}


/* ─── Compact sticky header ──────────────────────────────────────── */
/*
    Absolutely positioned, appears only after large header exits.
    X inside compact lands at identical screen coords as large header X.
    Both: center-Y = 28px (handle) + 26px (half of 52px zone) = 54px from sheet top.
*/
.sheet-compact{
  position:absolute;
  top:28px;left:0;right:0;
  height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  z-index:13;
  background:white;
  border-bottom:1px solid transparent;
  opacity:0;
  transform:translateY(-6px) scale(0.97);
  pointer-events:none;
  transition:opacity 0.22s ease, transform 0.22s ease, border-bottom-color 0.22s ease;
}
.sheet-compact.visible{
  opacity:1;
  transform:none;
  pointer-events:auto;
  border-bottom-color:var(--stroke);
  box-shadow:0 8px 24px 0 rgba(0,0,0,0.08);
}
.compact-title{
  font-size:18px;font-weight:450;line-height:20px;color:var(--c0);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;
}
.compact-close{
  width:28px;height:28px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}

/* ─── Scrollable body ────────────────────────────────────────────── */
.sheet-body{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  scrollbar-width:none;
}
.sheet-body::-webkit-scrollbar{display:none}

/* ─── Large header (in-flow, scrolls + fades) ────────────────────── */
/*
    padding-top:13px makes the title center land at 26px from this div's top.
    This div starts at 28px from sheet top (after handle zone, scrollTop=0).
    Title center = 28+26 = 54px from sheet top = same as compact header center. ✓
*/
.sheet-large{
  position:relative;
  padding:13px 24px 20px;
  flex-shrink:0;
  will-change:opacity;
}
.large-close{
  position:absolute;
  top:0;right:24px;
  width:28px;height:52px;        /* height 52 so its center = 26px, matching compact */
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.large-title{
  font-size:24px;font-weight:450;line-height:1.08;color:var(--c0);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
  padding-right:36px;            /* clear space for the absolute X */
}
.large-sub{
  font-size:16px;font-weight:420;line-height:1.4;color:var(--c1);
  margin-top:6px;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── Cards ──────────────────────────────────────────────────────── */
.sheet-grid{
  display:flex;flex-direction:column;gap:16px;
  padding:4px 24px 40px;
}
.sheet-card{
  border-radius:8px;overflow:hidden;
  background:#f7f7f8;flex-shrink:0;
}
.sheet-card-img{
  width:100%;
  aspect-ratio:342/382;
  overflow:hidden;background:#e5e6e6;
  border:1px solid rgba(241,241,241,1);
  border-bottom:none;
  border-radius:8px 8px 0 0;
}
.sheet-card-img img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.sheet-card-bar{
  display:flex;align-items:center;
  height:42px;
  padding:0 12px 0 8px;
  background:#f7f7f8;
  border:1px solid rgba(224,225,225,1);
  border-radius:0 0 8px 8px;
  gap:8px;
}
.sheet-card-prompt{
  flex:1;min-width:0;
  font-size:14px;font-weight:420;line-height:16px;color:var(--c1);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sheet-card-use{
  font-family:"Greed",sans-serif;
  font-size:14px;font-weight:450;color:var(--c0);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  white-space:nowrap;flex-shrink:0;
  text-decoration:underline;
  text-decoration-thickness:1px;
  text-underline-offset:2px;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}
</style>
</head>
<body>

<div class="phone">
  <div class="screen" id="screen">

    <!-- App header -->
    <div class="app-header">
      <button class="hdr-back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M3.667 12H20.333M9.333 17.667L3.667 12l5.666-5.667" stroke="#000409" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="hdr-credit">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="7.99961" cy="7.99961" r="6.4" stroke="#000409" stroke-width="1.4"/>
          <path d="M7.68636 5.64763L5.64825 7.68573C5.47469 7.8593 5.47469 8.1407 5.64825 8.31427L7.68636 10.3524C7.85992 10.5259 8.14133 10.5259 8.3149 10.3524L10.353 8.31427C10.5266 8.1407 10.5266 7.8593 10.353 7.68573L8.3149 5.64763C8.14133 5.47406 7.85992 5.47406 7.68636 5.64763Z" stroke="#000409" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>23</span>
      </div>
    </div>

    <!-- Base screen -->
    <div class="bg-screen">
      <button class="trigger-btn" id="triggerBtn" onclick="openSheet()">
        View recent generations
      </button>
    </div>

    <!-- Backdrop -->
    <div class="backdrop" id="backdrop" onclick="closeSheet()"></div>

    <!-- Sheet -->
    <div class="sheet" id="sheet">

      <!-- Drag handle -->
      <div class="sheet-handle-zone" id="handleZone">
        <div class="sheet-handle"></div>
      </div>

      <!-- Compact sticky header — appears after large header exits viewport -->
      <div class="sheet-compact" id="compactHeader">
        <span class="compact-title">Recent Generations</span>
        <button class="compact-close" onclick="closeSheet()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M1 1l11 11M12 1L1 12" stroke="#000409" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- Scrollable body -->
      <div class="sheet-body" id="sheetBody">

        <!-- Large header — scrolls and fades linearly with its own X -->
        <div class="sheet-large" id="largeHeader" data-stagger>
          <button class="large-close" onclick="closeSheet()">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M1 1l11 11M12 1L1 12" stroke="#000409" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="large-title">Recent Generations</div>
          <div class="large-sub">You can find these in your gallery later.</div>
        </div>

        <!-- Cards -->
        <div class="sheet-grid" id="sheetGrid"></div>

      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
// ─── Data ─────────────────────────────────────────────────────────
const PHOTOS = [
  './photos/photo-1.jpg',
  './photos/photo-3.jpg',
  './photos/photo-4.jpg',
  './photos/photo-6.jpg',
];
const PROMPTS = [
  'standing in front of the Eiffel Tower wearing a black leather jacket',
  'as a CEO in a sleek glass office at golden hour',
  'hiking in the Dolomites at sunrise in a red parka',
  'on a yacht in the Mediterranean wearing white linen',
];

// ─── DOM ──────────────────────────────────────────────────────────
const sheet       = document.getElementById('sheet');
const backdrop    = document.getElementById('backdrop');
const triggerBtn  = document.getElementById('triggerBtn');
const sheetBody   = document.getElementById('sheetBody');
const largeHeader = document.getElementById('largeHeader');
const compactHdr  = document.getElementById('compactHeader');
const sheetGrid   = document.getElementById('sheetGrid');

let isOpen  = false;
let largeH  = 0;   // measured height of .sheet-large, populated on open

// ─── Build 10 cards ───────────────────────────────────────────────
function buildCards() {
  sheetGrid.innerHTML = Array.from({ length: 10 }, (_, i) => `
    <div class="sheet-card" data-stagger>
      <div class="sheet-card-img">
        <img src="${PHOTOS[i % PHOTOS.length]}" loading="lazy"/>
      </div>
      <div class="sheet-card-bar">
        <span class="sheet-card-prompt">${PROMPTS[i % PROMPTS.length]}</span>
        <button class="sheet-card-use">Use</button>
      </div>
    </div>`).join('');
}

// ─── Open ─────────────────────────────────────────────────────────
function openSheet() {
  if (isOpen) return;
  isOpen = true;

  buildCards();
  sheetBody.scrollTop = 0;
  largeH = 0;
  compactHdr.classList.remove('visible');
  largeHeader.style.opacity = '';

  // All stagger targets start invisible
  gsap.set('[data-stagger]', { opacity: 0, y: 22 });

  sheet.classList.add('open');
  backdrop.classList.add('open');
  triggerBtn.classList.add('hidden');

  // Measure large header height after it renders (next frame after open)
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      largeH = largeHeader.offsetHeight;
    });
  });

  // Stagger: large header first, then cards sequentially
  gsap.to('[data-stagger]', {
    opacity: 1, y: 0,
    duration: 0.46,
    ease: 'power3.out',
    stagger: 0.07,
    delay: 0.14,
    clearProps: 'opacity,transform',
  });
}

// ─── Close ────────────────────────────────────────────────────────
function closeSheet() {
  if (!isOpen) return;
  isOpen = false;

  gsap.killTweensOf('[data-stagger]');
  sheet.classList.remove('open');
  backdrop.classList.remove('open');
  compactHdr.classList.remove('visible');
  largeHeader.style.opacity = '';

  setTimeout(() => triggerBtn.classList.remove('hidden'), 360);
}

// ─── Scroll: linear fade on large header, compact appears after ────
function onScroll() {
  if (!largeH) {
    // Measure lazily on first scroll if not yet measured
    largeH = largeHeader.offsetHeight;
    if (!largeH) return;
  }

  const scrollTop = sheetBody.scrollTop;

  // Large header: linear opacity fade as it scrolls up — no transform, just fade
  largeHeader.style.opacity = Math.max(0, 1 - scrollTop / largeH);

  // Compact header: only appears once large header has fully exited the viewport
  const fullyGone = scrollTop >= largeH;
  compactHdr.classList.toggle('visible', fullyGone);
}

sheetBody.addEventListener('scroll', onScroll, { passive: true });

// ─── Drag to dismiss ──────────────────────────────────────────────
(function() {
  let startY = 0, dragging = false;
  const zone = document.getElementById('handleZone');

  function start(e) {
    if (!isOpen) return;
    startY   = e.touches ? e.touches[0].clientY : e.clientY;
    dragging = true;
    sheet.style.transition = 'none';
  }
  function move(e) {
    if (!dragging) return;
    const dy = Math.max(0, (e.touches ? e.touches[0].clientY : e.clientY) - startY);
    sheet.style.transform = `translateY(${dy}px)`;
    backdrop.style.opacity = Math.max(0, 0.60 - dy / 500);
  }
  function end() {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = '';
    const dy = parseFloat(sheet.style.transform.replace('translateY(', '')) || 0;
    if (dy > 110) {
      sheet.style.transform = '';
      closeSheet();
    } else {
      sheet.style.transform = 'translateY(0)';
      backdrop.style.opacity = '';
    }
  }

  zone.addEventListener('touchstart', start, { passive: true });
  zone.addEventListener('touchmove',  move,  { passive: true });
  zone.addEventListener('touchend',   end);
  zone.addEventListener('mousedown',  start);
  window.addEventListener('mousemove', move);
  window.addEventListener('mouseup',   end);
})();
</script>
</body>
</html>
