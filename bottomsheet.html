<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Imagine · Bottom Sheet</title>
<style>
@font-face {
  font-family: "Greed";
  src: url("./Greed/GreedStandardVF.woff2") format("woff2"),
       url("./Greed/GreedStandardVF.ttf") format("truetype");
  font-weight: 100 900;
  font-style: normal;
}

:root {
  --bg:          #ffffff;
  --c0:          #000409;
  --c1:          #67707c;
  --stroke:      #e0e1e1;
  --accent:      #00875a;
  --icon-bg:     #f7f7f8;
  --shadow-sm:   0 2px 16px rgba(0,0,0,.10);
  --shadow-sheet:0 -8px 32px rgba(0,0,0,.14);
  --ease:        cubic-bezier(0.32,0.72,0,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0}

html,body{
  width:100%;height:100%;
  background:#f7f7f8;
  display:flex;align-items:center;justify-content:center;
  font-family:"Greed",-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}

/* ─── Phone ──────────────────────────────────────────────────── */
.phone{
  position:relative;
  width:393px;height:844px;
  background:white;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.35);
  flex-shrink:0;
}
@media(max-width:440px){
  html,body{background:white;align-items:flex-start}
  .phone{width:100%;height:100dvh;box-shadow:none}
}
@media(min-width:441px) and (max-height:880px){
  .phone{height:min(844px,100dvh);width:min(393px,100vw)}
}

.screen{
  position:relative;
  width:100%;height:100%;
  background:var(--bg);
  overflow:hidden;
}

/* ─── App header ─────────────────────────────────────────────── */
.app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 10px 8px;
  height:52px;
  position:absolute;top:0;left:0;right:0;
  z-index:10;
  background:var(--bg);
}
.hdr-back{
  width:40px;height:40px;
  border-radius:6px;display:flex;align-items:center;justify-content:center;
}
.hdr-credit{display:flex;align-items:center;gap:4px}
.hdr-credit span{
  font-size:16px;font-weight:450;line-height:18px;color:var(--c0);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── Background screen content ─────────────────────────────── */
.bg-screen{
  position:absolute;inset:0;
  padding:68px 24px 0;
}
.bg-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
}
.bg-card{
  aspect-ratio:1;border-radius:8px;background:#f0f0f0;overflow:hidden;
}
.bg-card img{width:100%;height:100%;object-fit:cover;display:block;}

/* ─── Backdrop ───────────────────────────────────────────────── */
.backdrop{
  position:absolute;inset:0;
  background:rgba(0,4,9,0.60);
  opacity:0;pointer-events:none;
  z-index:50;
  transition:opacity 0.44s var(--ease);
}
.backdrop.open{opacity:1;pointer-events:auto}

/* ─── Trigger ────────────────────────────────────────────────── */
.trigger-btn{
  position:absolute;
  bottom:88px;left:50%;transform:translateX(-50%);
  z-index:20;
  padding:14px 28px;
  background:var(--c0);
  border-radius:12px;
  color:white;
  font-family:"Greed",sans-serif;
  font-size:16px;font-weight:450;letter-spacing:-.1px;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
  box-shadow:0 4px 24px rgba(0,0,0,.22);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:transform .15s ease,box-shadow .15s ease,opacity .3s ease;
  white-space:nowrap;
}
.trigger-btn:active{transform:translateX(-50%) scale(0.97)}
.trigger-btn.hidden{opacity:0;pointer-events:none}

/* ─── Bottom sheet ───────────────────────────────────────────── */
.sheet{
  position:absolute;
  left:0;right:0;bottom:0;
  height:92%;
  background:white;
  border-top-left-radius:16px;
  border-top-right-radius:16px;
  box-shadow:var(--shadow-sheet);
  z-index:51;
  transform:translateY(100%);
  transition:transform 0.52s cubic-bezier(0.34,1.12,0.64,1);
  display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
  overflow:hidden;
  touch-action:none;
}
.sheet.open{transform:translateY(0)}

/* ─── Handle zone ────────────────────────────────────────────── */
.sheet-handle-zone{
  flex-shrink:0;
  height:28px;
  display:flex;justify-content:center;align-items:flex-start;
  padding-top:12px;
  cursor:grab;
  position:relative;
  z-index:12;
  background:white;
}
.sheet-handle{
  width:48px;height:4px;border-radius:999px;
  background:var(--stroke);
}

/* ─── Compact header (fixed, appears on scroll) ──────────────── */
.sheet-compact{
  position:absolute;
  top:28px;left:0;right:0;      /* flush below handle zone */
  height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  z-index:11;
  background:white;
  border-bottom:1px solid transparent;
  opacity:0;
  transform:translateY(-8px) scale(0.97);
  pointer-events:none;
  will-change:opacity,transform;
}
.compact-title{
  font-size:16px;font-weight:450;line-height:18px;color:var(--c0);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}
.compact-close{
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  cursor:pointer;
}

/* ─── Scrollable body ────────────────────────────────────────── */
.sheet-body{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  scrollbar-width:none;
}
.sheet-body::-webkit-scrollbar{display:none}

/* ─── Large header (in-flow, first child of body) ────────────── */
.sheet-large{
  padding:24px 24px 20px;
  position:relative;
  flex-shrink:0;
  will-change:opacity,transform;
}
.large-close{
  position:absolute;top:24px;right:24px;
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.large-title{
  font-size:24px;font-weight:450;line-height:1.08;color:var(--c0);
  padding-right:32px;           /* space for close button */
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}
.large-sub{
  font-size:16px;font-weight:420;line-height:1.4;color:var(--c1);
  margin-top:6px;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── Cards grid ─────────────────────────────────────────────── */
.sheet-grid{
  display:flex;flex-direction:column;gap:16px;
  padding:4px 24px 40px;
}
.sheet-card{
  border-radius:8px;overflow:hidden;
  background:#f7f7f8;
  flex-shrink:0;
}
.sheet-card-img{
  width:100%;
  aspect-ratio:342/382;
  overflow:hidden;
  background:#e5e6e6;
  border:1px solid rgba(241,241,241,1);
  border-bottom:none;
  border-radius:8px 8px 0 0;
}
.sheet-card-img img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.sheet-card-bar{
  display:flex;align-items:center;
  height:42px;
  padding:0 12px 0 8px;
  background:#f7f7f8;
  border:1px solid rgba(224,225,225,1);
  border-top:1px solid rgba(224,225,225,1);
  border-radius:0 0 8px 8px;
  gap:8px;
}
.sheet-card-prompt{
  flex:1;min-width:0;
  font-size:14px;font-weight:420;line-height:16px;color:var(--c1);
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sheet-card-use{
  font-family:"Greed",sans-serif;
  font-size:14px;font-weight:450;color:var(--c0);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  white-space:nowrap;flex-shrink:0;
  text-decoration:underline;
  text-decoration-thickness:1px;
  text-underline-offset:2px;
  font-feature-settings:"ss01"1,"ss02"1,"ss06"1;
}

/* ─── Variant switcher ───────────────────────────────────────── */
.var-sw{
  position:fixed;
  bottom:24px;left:50%;transform:translateX(-50%);
  z-index:9999;
  background:rgba(10,10,10,.82);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-radius:100px;
  display:flex;gap:2px;padding:4px;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
@media(max-width:440px){
  .var-sw{bottom:calc(env(safe-area-inset-bottom)+10px)}
}
.var-btn{
  padding:7px 16px;
  border-radius:100px;
  color:rgba(255,255,255,.5);
  font-family:"Greed",sans-serif;
  font-size:13px;font-weight:450;
  transition:background .2s ease,color .2s ease;
  white-space:nowrap;
}
.var-btn.active{background:white;color:var(--c0)}
</style>
</head>
<body>

<div class="phone">
  <div class="screen" id="screen">

    <!-- App header -->
    <div class="app-header">
      <button class="hdr-back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M3.667 12H20.333M9.333 17.667L3.667 12l5.666-5.667" stroke="#000409" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="hdr-credit">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="7.99961" cy="7.99961" r="6.4" stroke="#000409" stroke-width="1.4"/>
          <path d="M7.68636 5.64763L5.64825 7.68573C5.47469 7.8593 5.47469 8.1407 5.64825 8.31427L7.68636 10.3524C7.85992 10.5259 8.14133 10.5259 8.3149 10.3524L10.353 8.31427C10.5266 8.1407 10.5266 7.8593 10.353 7.68573L8.3149 5.64763C8.14133 5.47406 7.85992 5.47406 7.68636 5.64763Z" stroke="#000409" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>23</span>
      </div>
    </div>

    <!-- Background content -->
    <div class="bg-screen">
      <div class="bg-grid" id="bgGrid"></div>
    </div>

    <!-- Trigger -->
    <button class="trigger-btn" id="triggerBtn" onclick="openSheet()">
      View recent generations
    </button>

    <!-- Backdrop -->
    <div class="backdrop" id="backdrop" onclick="closeSheet()"></div>

    <!-- Sheet -->
    <div class="sheet" id="sheet">

      <!-- Drag handle -->
      <div class="sheet-handle-zone" id="handleZone">
        <div class="sheet-handle"></div>
      </div>

      <!-- Compact sticky header (scroll-driven) -->
      <div class="sheet-compact" id="compactHeader">
        <span class="compact-title" id="compactTitle">Recent Generations</span>
        <button class="compact-close" onclick="closeSheet()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M1 1l11 11M12 1L1 12" stroke="#000409" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- Scrollable body -->
      <div class="sheet-body" id="sheetBody">

        <!-- Large header (stagger target, scrolls away) -->
        <div class="sheet-large" id="largeHeader" data-stagger>
          <button class="large-close" onclick="closeSheet()">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M1 1l11 11M12 1L1 12" stroke="#000409" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="large-title" id="largeTitle">Recent Generations</div>
          <div class="large-sub" id="largeSub">You can find these in your gallery later.</div>
        </div>

        <!-- Cards injected by JS -->
        <div class="sheet-grid" id="sheetGrid"></div>

      </div>
    </div>

  </div>
</div>

<!-- Variant switcher -->
<div class="var-sw">
  <button class="var-btn active" id="v1" onclick="setVariant(1)">4 cards</button>
  <button class="var-btn"        id="v2" onclick="setVariant(2)">8 cards</button>
  <button class="var-btn"        id="v3" onclick="setVariant(3)">1 card</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
// ─── Data ─────────────────────────────────────────────────────────
const PHOTOS = [
  './photos/photo-1.jpg',
  './photos/photo-3.jpg',
  './photos/photo-4.jpg',
  './photos/photo-6.jpg',
];
const PROMPTS = [
  'standing in front of the Eiffel Tower wearing a black leather jacket',
  'as a CEO in a sleek glass office at golden hour',
  'hiking in the Dolomites at sunrise in a red parka',
  'on a yacht in the Mediterranean wearing white linen',
];

// ─── DOM refs ─────────────────────────────────────────────────────
const sheet        = document.getElementById('sheet');
const backdrop     = document.getElementById('backdrop');
const triggerBtn   = document.getElementById('triggerBtn');
const sheetBody    = document.getElementById('sheetBody');
const largeHeader  = document.getElementById('largeHeader');
const compactHdr   = document.getElementById('compactHeader');
const sheetGrid    = document.getElementById('sheetGrid');
const bgGrid       = document.getElementById('bgGrid');

let isOpen       = false;
let cardCount    = 4;

// ─── How far (px) user must scroll before large→compact completes
const SCROLL_RANGE = 88;

// ─── Background grid ──────────────────────────────────────────────
bgGrid.innerHTML = PHOTOS.map(src =>
  `<div class="bg-card"><img src="${src}"/></div>`
).join('');

// ─── Build cards ──────────────────────────────────────────────────
function buildCards(n) {
  sheetGrid.innerHTML = Array.from({ length: n }, (_, i) => {
    const src    = PHOTOS[i % PHOTOS.length];
    const prompt = PROMPTS[i % PROMPTS.length];
    return `
      <div class="sheet-card" data-stagger>
        <div class="sheet-card-img"><img src="${src}" loading="lazy"/></div>
        <div class="sheet-card-bar">
          <span class="sheet-card-prompt">${prompt}</span>
          <button class="sheet-card-use">Use</button>
        </div>
      </div>`;
  }).join('');
}

// ─── Open sheet ───────────────────────────────────────────────────
function openSheet() {
  if (isOpen) return;
  isOpen = true;

  buildCards(cardCount);

  // Reset scroll + header state
  sheetBody.scrollTop = 0;
  resetScrollHeader();

  // Hide all stagger targets instantly before animating in
  gsap.set('[data-stagger]', { opacity: 0, y: 22 });

  // Slide sheet up + fade backdrop simultaneously
  sheet.classList.add('open');
  backdrop.classList.add('open');
  triggerBtn.classList.add('hidden');

  // Stagger content in once sheet has begun its rise (140ms in)
  gsap.to('[data-stagger]', {
    opacity: 1,
    y: 0,
    duration: 0.48,
    ease: 'power3.out',
    stagger: 0.07,
    delay: 0.14,
    clearProps: 'opacity,transform',
  });
}

// ─── Close sheet ──────────────────────────────────────────────────
function closeSheet() {
  if (!isOpen) return;
  isOpen = false;

  gsap.killTweensOf('[data-stagger]');
  sheet.classList.remove('open');
  backdrop.classList.remove('open');

  setTimeout(() => {
    triggerBtn.classList.remove('hidden');
  }, 360);
}

// ─── Scroll-driven header ─────────────────────────────────────────
function resetScrollHeader() {
  largeHeader.style.opacity = '';
  largeHeader.style.transform = '';
  compactHdr.style.opacity = '0';
  compactHdr.style.transform = 'translateY(-8px) scale(0.97)';
  compactHdr.style.borderBottomColor = 'transparent';
  compactHdr.style.pointerEvents = 'none';
}

function onScroll() {
  const t = Math.min(1, Math.max(0, sheetBody.scrollTop / SCROLL_RANGE));

  // Large header: fade up and out
  largeHeader.style.opacity  = (1 - t);
  largeHeader.style.transform = `translateY(${-t * 14}px)`;

  // Compact header: emerge from above with scale (z-axis feel)
  const scale = 0.97 + t * 0.03;
  compactHdr.style.opacity   = t;
  compactHdr.style.transform = `translateY(${(1 - t) * -10}px) scale(${scale.toFixed(4)})`;
  compactHdr.style.borderBottomColor = `rgba(224,225,225,${t})`;
  compactHdr.style.pointerEvents = t > 0.5 ? 'auto' : 'none';
}

sheetBody.addEventListener('scroll', onScroll, { passive: true });

// ─── Drag to dismiss ──────────────────────────────────────────────
(function() {
  let startY = 0, dragging = false;
  const zone = document.getElementById('handleZone');

  function start(e) {
    if (!isOpen) return;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    dragging = true;
    sheet.style.transition = 'none';
  }
  function move(e) {
    if (!dragging) return;
    const dy = Math.max(0, (e.touches ? e.touches[0].clientY : e.clientY) - startY);
    sheet.style.transform = `translateY(${dy}px)`;
    backdrop.style.opacity = Math.max(0, 0.60 - dy / 500);
  }
  function end() {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = '';
    const dy = parseFloat(sheet.style.transform.replace('translateY(', '')) || 0;
    if (dy > 110) {
      sheet.style.transform = '';
      closeSheet();
    } else {
      sheet.style.transform = 'translateY(0)';
      backdrop.style.opacity = '';
    }
  }

  zone.addEventListener('touchstart', start, { passive: true });
  zone.addEventListener('touchmove',  move,  { passive: true });
  zone.addEventListener('touchend',   end);
  zone.addEventListener('mousedown',  start);
  window.addEventListener('mousemove', move);
  window.addEventListener('mouseup',   end);
})();

// ─── Variant switcher ─────────────────────────────────────────────
function setVariant(n) {
  cardCount = n === 1 ? 1 : n === 2 ? 8 : 4;
  [1, 2, 3].forEach(k => {
    document.getElementById('v' + k).classList.toggle('active', k === n);
  });
  if (isOpen) {
    // Quick re-open
    gsap.killTweensOf('[data-stagger]');
    sheet.classList.remove('open');
    backdrop.classList.remove('open');
    isOpen = false;
    setTimeout(openSheet, 340);
  }
}
</script>
</body>
</html>
